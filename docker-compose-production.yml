version: '3.9'

services:
  rts-frontend:
    container_name: pps-frontend
    image:  003380494896.dkr.ecr.ap-south-1.amazonaws.com/realt-pps-be-production:${IMAGE_TAG?IMAGE_TAG environment variable is required}
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    restart: unless-stopped

