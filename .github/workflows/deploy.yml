name: Deploy to EC2

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      image_tag:
        required: true
        type: string
# on:
#   workflow_run:
#     workflows: ["Build and Push Docker Image"] # Trigger after build finishes
#     types: [completed]
#     branches: [qa, pps-master]

jobs:
  deploy:
    runs-on: ${{ github.ref_name == 'pps-master' && fromJson('["self-hosted","production"]') || fromJson('["self-hosted","dev"]') }}
    # if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'pps-master' || github.event.workflow_run.head_branch == 'qa') }}
    
    env:
      TARGET_DIR: "/home/ubuntu/app"
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        # No 'ref' needed! It automatically checks out the branch that called it.

      - name: Set Environment Variables
        id: vars
        run: |
          # 1. Force the branch name from the trigger
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          # 2. Match the tag from the build workflow
          TAG="build-${{ github.event.workflow_run.run_number }}"
          
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          
          if [[ "$BRANCH" == "pps-master" ]]; then
            echo "FILE=docker-compose-prod.yml" >> $GITHUB_ENV
            echo "SRV=${{ secrets.APP_SERVER_PROD }}" >> $GITHUB_ENV
            echo "USR=${{ secrets.SSH_USER_NAME_PROD }}" >> $GITHUB_ENV
            echo "SEC=${{ secrets.APP_SECRET_NAME_PROD }}" >> $GITHUB_ENV
          else
            echo "FILE=docker-compose-qa.yml" >> $GITHUB_ENV
            echo "SRV=${{ secrets.APP_SERVER_DEV }}" >> $GITHUB_ENV
            echo "USR=${{ secrets.SSH_USER_NAME_DEV }}" >> $GITHUB_ENV
            echo "SEC=${{ secrets.APP_SECRET_NAME_DEV }}" >> $GITHUB_ENV
          fi

      - name: 1. Copy Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SRV }}
          username: ${{ env.USR }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "${{ env.FILE }},docker-compose.yml" # Copy both files
          target: "/home/ubuntu/app"

      - name: 2. Execute Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SRV }}
          username: ${{ env.USR }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Pass variables into the remote shell environment
          envs: IMAGE_TAG,ECR_REGISTRY,IMAGE_NAME,SEC,FILE,TARGET_DIR
          script: |
            cd /home/ubuntu/app
            
            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # Fetch secrets to .env
            aws secretsmanager get-secret-value --secret-id "$SEC" --query SecretString --output text \
              | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]' > .env
            
            # Pull and Run
            IMAGE_TAG=$IMAGE_TAG docker compose -f $FILE pull
            IMAGE_TAG=$IMAGE_TAG docker compose -f $FILE up -d

      - name: Cleanup workspace
        if: always()
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +