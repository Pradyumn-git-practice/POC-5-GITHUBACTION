name: Deploy Docker Image to Server

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      image_tag:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      branch:  # Used for environment selection selection
        description: "Select the branch to deploy (qa for dev, pps-master for prod)"
        required: true
        default: qa
        type: choice
        options:
          - qa
          - pps-master

      image_tag: 
        description: Docker image tag
        required: true

concurrency:
  group: deploy-${{ inputs.branch || github.event.inputs.branch }}
  cancel-in-progress: true

run-name: "Deploy #${{ inputs.image_tag || github.event.inputs.image_tag }} [${{ github.ref_name }}] - ${{ github.event.head_commit.message || 'Manual Run' }}"

jobs:
  deploy:
    # For production branch, use production runner, otherwise use dev runner
    runs-on: ${{ (inputs.branch || github.event.inputs.branch) == 'pps-master' && fromJson('["self-hosted","production"]') || fromJson('["self-hosted","dev"]') }}    
    env:
      TARGET_DIR:  ${{ vars.TARGET_DIR }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      REGION: ${{ secrets.REGION }}

    # Set environment for deployment job based on branch
    environment: ${{ 
      (inputs.branch || github.event.inputs.branch) == 'pps-master' && 'prod' ||
      (inputs.branch || github.event.inputs.branch) == 'qa' && 'dev' }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.event.inputs.branch }}

      - name: Set Environment Variables
        run: |
          echo "APP_SERVER=${{ vars.APP_SERVER }}" >> $GITHUB_ENV
          echo "APP_SECRET_NAME=${{ secrets.APP_SECRET_NAME }}" >> $GITHUB_ENV
          echo "COMPOSE_FILE=docker-compose-${{ vars.ENV }}.yml" >> $GITHUB_ENV

      - name: 1. Copy Docker Compose to App Server
        run: |
          ssh -o StrictHostKeyChecking=no $APP_SERVER "mkdir -p $TARGET_DIR"

          scp -o StrictHostKeyChecking=no  ${{ env.COMPOSE_FILE }} $APP_SERVER:$TARGET_DIR/

      - name: 2. Create .env, Pull and Run Docker Compose
        run: |
          ssh -T -o StrictHostKeyChecking=no $APP_SERVER << EOF
            set -euo pipefail
            set +x

            cd $TARGET_DIR

            
            aws secretsmanager get-secret-value --secret-id "$APP_SECRET_NAME" --region "$REGION" --query SecretString --output text  | jq -r 'to_entries[] | "\(.key)=\(.value)"' > .env

            chmod 600 .env
            
            aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

            export IMAGE_TAG=${{ inputs.image_tag || github.event.inputs.image_tag }}
            docker compose -f $COMPOSE_FILE pull
            docker compose -f $COMPOSE_FILE up -d --force-recreate
            docker images "$ECR_REGISTRY/$IMAGE_NAME-$ENV" --format "{{.ID}}" | tail -n +4 | xargs -r docker image rm -f 2>/dev/null || true

          EOF

      - name: Cleanup workspace
        if: always()
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +