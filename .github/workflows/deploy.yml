name: Deploy to Amazon ECS

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      image_tag:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      branch:
        description: "Select the branch to deploy (qa for dev, pps-master for prod)"
        required: true
        default: qa
        type: choice
        options:
          - staging
          - main

      image_tag:
        description: Docker image tag to deploy
        required: true

concurrency:
  group: deploy-${{ inputs.branch || github.event.inputs.branch }}
  cancel-in-progress: true

run-name: "Deploy #${{ inputs.image_tag || github.event.inputs.image_tag }} [${{ github.ref_name }}] - ${{ github.event.head_commit.message || 'Manual Run' }}"

jobs:
  deploy:
    runs-on: ${{ (inputs.branch || github.event.inputs.branch) == 'main' && fromJson('["self-hosted","production"]') || fromJson('["self-hosted","dev"]') }}

    env:
      REGION: ${{ secrets.REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
      IMAGE_TAG: ${{ inputs.image_tag || github.event.inputs.image_tag }}

    environment: ${{
      (inputs.branch || github.event.inputs.branch) == 'main' && 'prod' ||
      (inputs.branch || github.event.inputs.branch) == 'staging' && 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.event.inputs.branch }}

      - name: Set deployment variables
        run: |
          echo "ENV=${{ vars.ENV }}" >> $GITHUB_ENV
          echo "IMAGE_URI=${ECR_REGISTRY}/${IMAGE_NAME}-${{ vars.ENV }}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Validate required ECS variables
        run: |
          set -euo pipefail
          : "${ECS_CLUSTER:?ECS_CLUSTER variable is required}"
          : "${ECS_SERVICE:?ECS_SERVICE variable is required}"
          : "${ECS_CONTAINER_NAME:?ECS_CONTAINER_NAME variable is required}"
          : "${IMAGE_URI:?IMAGE_URI must be set}"

      - name: Validate ECS service exists
        run: |
          set -euo pipefail

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$REGION" > service-details.json

          SERVICE_FAILURE_REASON=$(jq -r '.failures[0].reason // empty' service-details.json)
          SERVICE_FAILURE_ARN=$(jq -r '.failures[0].arn // empty' service-details.json)
          if [ -n "$SERVICE_FAILURE_REASON" ]; then
            if [ "$SERVICE_FAILURE_REASON" = "MISSING" ]; then
              echo "Configured ECS service '$ECS_SERVICE' not found. Attempting auto-detection in cluster '$ECS_CLUSTER'." >&2

              mapfile -t CLUSTER_SERVICE_ARNS < <(
                aws ecs list-services \
                  --cluster "$ECS_CLUSTER" \
                  --region "$REGION" \
                  --query 'serviceArns[]' \
                  --output text | tr '\t' '\n' | sed '/^$/d'
              )

              if [ "${#CLUSTER_SERVICE_ARNS[@]}" -eq 0 ]; then
                echo "No ECS services found in cluster '$ECS_CLUSTER'." >&2
                exit 1
              fi

              if [ "${#CLUSTER_SERVICE_ARNS[@]}" -eq 1 ]; then
                ECS_SERVICE="${CLUSTER_SERVICE_ARNS[0]##*/}"
                echo "Auto-selected only service in cluster: $ECS_SERVICE" >&2
              elif [ -n "${ECS_TASK_DEFINITION:-}" ]; then
                TASK_FAMILY="${ECS_TASK_DEFINITION##*/}"
                TASK_FAMILY="${TASK_FAMILY%%:*}"

                mapfile -t MATCHED_SERVICES < <(
                  aws ecs describe-services \
                    --cluster "$ECS_CLUSTER" \
                    --services "${CLUSTER_SERVICE_ARNS[@]}" \
                    --region "$REGION" \
                    --query 'services[].{serviceName:serviceName,taskDefinition:taskDefinition}' \
                    --output json | jq -r --arg family "$TASK_FAMILY" '.[] | select(.taskDefinition | contains("task-definition/" + $family + ":")) | .serviceName'
                )

                if [ "${#MATCHED_SERVICES[@]}" -eq 1 ]; then
                  ECS_SERVICE="${MATCHED_SERVICES[0]}"
                  echo "Auto-selected service from task family '$TASK_FAMILY': $ECS_SERVICE" >&2
                fi
              fi

              if [ -z "${ECS_SERVICE:-}" ] || [ "$ECS_SERVICE" = "${SERVICE_FAILURE_ARN##*/}" ]; then
                echo "Unable to auto-detect ECS service. Available services:" >&2
                printf '%s\n' "${CLUSTER_SERVICE_ARNS[@]##*/}" >&2
                echo "Set ECS_SERVICE to one of the above service names (or full ARN) in GitHub Environment variables." >&2
                exit 1
              fi

              aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$ECS_SERVICE" \
                --region "$REGION" > service-details.json

              SERVICE_FAILURE_REASON=$(jq -r '.failures[0].reason // empty' service-details.json)
              if [ -n "$SERVICE_FAILURE_REASON" ]; then
                echo "ECS service lookup failed after auto-detection: ${SERVICE_FAILURE_REASON}" >&2
                exit 1
              fi

              echo "ECS_SERVICE=$ECS_SERVICE" >> $GITHUB_ENV
            else
              echo "ECS service lookup failed for ${SERVICE_FAILURE_ARN}: ${SERVICE_FAILURE_REASON}" >&2
              echo "Verify ECS_CLUSTER='$ECS_CLUSTER' and ECS_SERVICE='$ECS_SERVICE' in the selected GitHub Environment variables." >&2
              exit 1
            fi
          fi

          SERVICE_STATUS=$(jq -r '.services[0].status // empty' service-details.json)
          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            echo "ECS service is not ACTIVE (status=$SERVICE_STATUS)." >&2
            exit 1
          fi

      - name: Validate image exists in ECR
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "${IMAGE_NAME}-${ENV}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region "$REGION" >/dev/null

      - name: Register new task definition revision
        run: |
          set -euo pipefail

          if [ -n "${ECS_TASK_DEFINITION:-}" ]; then
            CURRENT_TASK_DEF_ARN="$ECS_TASK_DEFINITION"
          else
            CURRENT_TASK_DEF_ARN=$(jq -r '.services[0].taskDefinition // empty' service-details.json)
          fi

          if [ -z "$CURRENT_TASK_DEF_ARN" ] || [ "$CURRENT_TASK_DEF_ARN" = "None" ] || [ "$CURRENT_TASK_DEF_ARN" = "null" ]; then
            echo "Unable to resolve current task definition. Check ECS_CLUSTER/ECS_SERVICE or set ECS_TASK_DEFINITION variable." >&2
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --region "$REGION" \
            --query 'taskDefinition' > task-def.json

          jq 'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .deregisteredAt,
                .deregisteredBy
              )
              | .containerDefinitions |= map(
                  if .name == env.ECS_CONTAINER_NAME
                  then .image = env.IMAGE_URI
                  else .
                  end
                )' task-def.json > new-task-def.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --region "$REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Deploy task definition to ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment \
            --region "$REGION" >/dev/null

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$REGION"
        

      - name: Cleanup old Task Definitions
        if: success()
        run: |
            set -euo pipefail
            
            # Use the GitHub variable, defaulting to 50 if it's missing
            LIMIT=${{ vars.MAX_REVISIONS || 50 }}
            
            # Use the variable exported to GITHUB_ENV in the previous step
            echo "Cleaning up revisions for family: $TASK_FAMILY (Keeping top $LIMIT)"
            
            OLD_REVISIONS=$(aws ecs list-task-definitions \
              --family-prefix "$TASK_FAMILY" \
              --status ACTIVE \
              --sort DESC \
              --region "$REGION" \
              --query 'taskDefinitionArns' \
              --output json | jq -r ".[$LIMIT:] | .[]")

            if [ -z "$OLD_REVISIONS" ]; then
              echo "Fewer than $LIMIT revisions found. No cleanup needed."
              exit 0
            fi

            for arn in $OLD_REVISIONS; do
              echo "Deregistering old revision: $arn"
              aws ecs deregister-task-definition --task-definition "$arn" --region "$REGION" > /dev/null
            done






      - name: Cleanup workspace
        if: always()
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +