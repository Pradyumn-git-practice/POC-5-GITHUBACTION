name: Deploy to EC2

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      image_tag:
        required: true
        type: string


jobs:
  deploy:
    runs-on: ${{ github.ref_name == 'pps-master' && fromJson('["self-hosted","production"]') || fromJson('["self-hosted","dev"]') }}
    
    env:
      TARGET_DIR: "/home/ubuntu/app"
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [[ "${{ inputs.branch }}" == "pps-master" ]]; then
            echo "COMPOSE_FILE=docker-compose-prod.yml" >> $GITHUB_ENV
            echo "APP_SERVER=${{ secrets.APP_SERVER_PROD }}" >> $GITHUB_ENV
            echo "SSH_USER=${{ secrets.SSH_USER_NAME_PROD }}" >> $GITHUB_ENV
            echo "APP_SECRET_NAME=${{ secrets.APP_SECRET_NAME_PROD }}" >> $GITHUB_ENV
          elif [[ "${{ inputs.branch }}" == "qa" ]]; then
            echo "COMPOSE_FILE=docker-compose-qa.yml" >> $GITHUB_ENV
            echo "APP_SERVER=${{ secrets.APP_SERVER_DEV }}" >> $GITHUB_ENV
            echo "SSH_USER=${{ secrets.SSH_USER_NAME_DEV }}" >> $GITHUB_ENV
            echo "APP_SECRET_NAME=${{ secrets.APP_SECRET_NAME_DEV }}" >> $GITHUB_ENV
          else
              echo "Unsupported branch: ${{ inputs.branch }}"
              exit 1
          fi

      - name: 1. Copy Docker Compose to App Server
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$APP_SERVER "mkdir -p $TARGET_DIR"

          scp -o StrictHostKeyChecking=no  ${{ env.COMPOSE_FILE }} $SSH_USER@$APP_SERVER:$TARGET_DIR/

      - name: 2. Create .env, Pull and Run Docker Compose
        run: |
          ssh -T -o StrictHostKeyChecking=no $SSH_USER@$APP_SERVER << EOF
            set -euo pipefail
            set +x

            cd $TARGET_DIR

            aws secretsmanager get-secret-value --secret-id "$APP_SECRET_NAME" --query SecretString --output text > .env

            chmod 600 .env
            
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin $ECR_REGISTRY

            export IMAGE_TAG=${{ inputs.image_tag }}
            docker compose -f $COMPOSE_FILE pull
            docker compose -f $COMPOSE_FILE up -d --force-recreate
          EOF

      - name: Cleanup workspace
        if: always()
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +