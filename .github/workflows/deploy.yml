name: Deploy to Amazon ECS

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      image_tag:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      branch:
        description: "Select the branch to deploy (qa for dev, pps-master for prod)"
        required: true
        default: qa
        type: choice
        options:
          - staging
          - main

      image_tag:
        description: Docker image tag to deploy
        required: true

concurrency:
  group: deploy-${{ inputs.branch || github.event.inputs.branch }}
  cancel-in-progress: true

run-name: "Deploy #${{ inputs.image_tag || github.event.inputs.image_tag }} [${{ github.ref_name }}] - ${{ github.event.head_commit.message || 'Manual Run' }}"

jobs:
  deploy:
    runs-on: ${{ (inputs.branch || github.event.inputs.branch) == 'main' && fromJson('["self-hosted","production"]') || fromJson('["self-hosted","dev"]') }}

    env:
      REGION: ${{ secrets.REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
      IMAGE_TAG: ${{ inputs.image_tag || github.event.inputs.image_tag }}

    environment: ${{
      (inputs.branch || github.event.inputs.branch) == 'main' && 'prod' ||
      (inputs.branch || github.event.inputs.branch) == 'staging' && 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.event.inputs.branch }}

      - name: Set deployment variables
        run: |
          echo "ENV=${{ vars.ENV }}" >> $GITHUB_ENV
          echo "IMAGE_URI=${ECR_REGISTRY}/${IMAGE_NAME}-${{ vars.ENV }}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Validate required ECS variables
        run: |
          set -euo pipefail
          : "${ECS_CLUSTER:?ECS_CLUSTER variable is required}"
          : "${ECS_SERVICE:?ECS_SERVICE variable is required}"
          : "${ECS_CONTAINER_NAME:?ECS_CONTAINER_NAME variable is required}"
          : "${IMAGE_URI:?IMAGE_URI must be set}"

      - name: Validate image exists in ECR
        run: |
          set -euo pipefail
          aws ecr describe-images \
            --repository-name "${IMAGE_NAME}-${ENV}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region "$REGION" >/dev/null

      - name: Register new task definition revision
        run: |
          set -euo pipefail

          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$REGION" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --region "$REGION" \
            --query 'taskDefinition' > task-def.json

          jq 'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy,
                .deregisteredAt,
                .deregisteredBy
              )
              | .containerDefinitions |= map(
                  if .name == env.ECS_CONTAINER_NAME
                  then .image = env.IMAGE_URI
                  else .
                  end
                )' task-def.json > new-task-def.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --region "$REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Deploy task definition to ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment \
            --region "$REGION" >/dev/null

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$REGION"

      - name: Cleanup workspace
        if: always()
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +